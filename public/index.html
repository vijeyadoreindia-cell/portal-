<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADORE – Motivating Youth for Positive Action</title>
    <meta name="description" content="ADORE portal – podcasts, webinars, and youth empowerment resources." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
      /* ── Loading Screen ── */
      #app-loader {
        position: fixed;
        inset: 0;
        background: #f4f7fb;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 28px;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #app-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Logo pulse ring */
      .loader-logo-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .loader-ring {
        position: absolute;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 2.5px solid transparent;
        border-top-color: #e07b2a;
        border-right-color: #3a5a8a;
        animation: spin 1.2s linear infinite;
      }

      .loader-ring-2 {
        position: absolute;
        width: 130px;
        height: 130px;
        border-radius: 50%;
        border: 1.5px solid transparent;
        border-bottom-color: #e07b2a;
        border-left-color: #3a5a8a;
        opacity: 0.4;
        animation: spin 2s linear infinite reverse;
      }

      .loader-logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
        border-radius: 12px;
        animation: pulse 1.8s ease-in-out infinite;
      }

      /* Tagline */
      .loader-tagline {
        font-family: 'Nunito', sans-serif;
        font-size: 0.9rem;
        color: #8fa3bf;
        letter-spacing: 0.5px;
        animation: fadeInUp 0.6s ease both;
      }

      .loader-tagline span {
        color: #e07b2a;
        font-weight: 700;
      }

      /* Progress dots */
      .loader-dots {
        display: flex;
        gap: 8px;
      }

      .loader-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #3a5a8a;
        animation: dotBounce 1.2s ease-in-out infinite;
      }

      .loader-dots span:nth-child(2) { animation-delay: 0.2s; background: #e07b2a; }
      .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.94); opacity: 0.85; }
      }

      @keyframes dotBounce {
        0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
        40% { transform: scale(1.2); opacity: 1; }
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>

    <!-- Loading Screen -->
    <div id="app-loader">
      <div class="loader-logo-wrap">
        <div class="loader-ring-2"></div>
        <div class="loader-ring"></div>
        <img src="/favicon.png" alt="ADORE" class="loader-logo" />
      </div>
      <p class="loader-tagline">Motivating youth for <span>positive action</span></p>
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      // Hide loader once React has painted the first frame
      window.__hideLoader = function () {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.classList.add('hidden');
          setTimeout(function () { loader.remove(); }, 600);
        }
      };

      // Fallback: force-hide after 6s even if React fails
      setTimeout(function () {
        window.__hideLoader && window.__hideLoader();
      }, 6000);
    </script>
  </body>
</html>
